    <path d="M0,820 L280,820 L330,770 L330,620"/>
    <path d="M0,840 L260,840 L310,790 L310,640"/>
    <path d="M350,750 L500,750 L550,700"/>
    <path d="M330,770 L480,770 L530,720"/>
    <path d="M310,790 L460,790 L510,740"/>
    <path d="M350,600 L350,500 L400,450"/>
    <path d="M330,620 L330,520 L380,470"/>
  </g>

  <!-- Bottom-right cluster -->
  <g stroke="#ff6b35" stroke-width="1.5" fill="none" opacity="0.14">
    <path d="M1920,850 L1600,850 L1550,800 L1550,650"/>
    <path d="M1920,870 L1620,870 L1570,820 L1570,670"/>
    <path d="M1920,890 L1640,890 L1590,840 L1590,690"/>

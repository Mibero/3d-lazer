  <circle cx="500" cy="750" r="3" fill="#00d4ff" opacity="0.6"/>
  <circle cx="350" cy="600" r="16" fill="url(#glow1)" filter="url(#blur-glow)"/>
  <circle cx="350" cy="600" r="4" fill="#00d4ff" opacity="0.7"/>
  <circle cx="400" cy="450" r="18" fill="url(#glow1)" filter="url(#blur-glow)"/>

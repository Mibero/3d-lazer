  <circle cx="1070" cy="250" r="3" fill="#00d4ff" opacity="0.5"/>
  <circle cx="850" cy="830" r="14" fill="url(#glow2)" filter="url(#blur-glow)"/>
  <circle cx="850" cy="830" r="3" fill="#ff6b35" opacity="0.5"/>
  <circle cx="1070" cy="830" r="14" fill="url(#glow2)" filter="url(#blur-glow)"/>
  <circle cx="1070" cy="830" r="3" fill="#ff6b35" opacity="0.5"/>

  <!-- Scattered small nodes -->

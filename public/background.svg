  <circle cx="700" cy="500" r="2" fill="#ff6b35" opacity="0.3"/>
  <circle cx="1200" cy="300" r="2" fill="#ff6b35" opacity="0.3"/>
  <circle cx="1300" cy="500" r="2" fill="#00d4ff" opacity="0.3"/>

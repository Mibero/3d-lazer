  <g stroke="#00d4ff" stroke-width="1" fill="none" opacity="0.1">
    <path d="M800,0 L800,200 L850,250 L850,400 L900,450"/>
    <path d="M820,0 L820,180 L870,230 L870,380 L920,430"/>
    <path d="M1120,0 L1120,200 L1070,250 L1070,400 L1020,450"/>
    <path d="M1100,0 L1100,180 L1050,230 L1050,380 L1000,430"/>

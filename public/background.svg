  <circle cx="250" cy="250" r="20" fill="url(#glow1)" filter="url(#blur-glow)"/>
  <circle cx="250" cy="250" r="4" fill="#00d4ff" opacity="0.8"/>
  <circle cx="400" cy="250" r="15" fill="url(#glow1)" filter="url(#blur-glow)"/>
  <circle cx="400" cy="250" r="3" fill="#00d4ff" opacity="0.7"/>
  <circle cx="250" cy="400" r="12" fill="url(#glow1)" filter="url(#blur-glow)"/>
  <circle cx="250" cy="400" r="3" fill="#00d4ff" opacity="0.6"/>
  <circle cx="300" cy="550" r="18" fill="url(#glow1)" filter="url(#blur-glow)"/>
  <circle cx="300" cy="550" r="4" fill="#00d4ff" opacity="0.7"/>


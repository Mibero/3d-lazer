    <path d="M0,220 L180,220 L230,270 L230,380"/>
    <path d="M0,240 L160,240 L210,290 L210,360"/>
    <path d="M250,250 L400,250 L450,300"/>
    <path d="M230,270 L380,270 L430,320"/>
    <path d="M210,290 L360,290 L410,340"/>
    <path d="M250,400 L250,500 L300,550"/>
    <path d="M230,380 L230,480 L280,530"/>
  </g>

  <!-- Top-right cluster -->
  <g stroke="#ff6b35" stroke-width="1.5" fill="none" opacity="0.18">
    <path d="M1920,150 L1700,150 L1650,200 L1650,350"/>
    <path d="M1920,170 L1720,170 L1670,220 L1670,330"/>
    <path d="M1920,190 L1740,190 L1690,240 L1690,310"/>
    <path d="M1650,200 L1500,200 L1450,250"/>

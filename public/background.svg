    <path d="M1570,820 L1420,820 L1370,770"/>
    <path d="M1590,840 L1440,840 L1390,790"/>
    <path d="M1550,650 L1550,550 L1500,500"/>
    <path d="M1570,670 L1570,570 L1520,520"/>
  </g>


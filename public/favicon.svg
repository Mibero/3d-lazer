<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cube-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0055aa;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="edge-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#ff6b35;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="laser-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1"/>
      <stop offset="30%" style="stop-color:#ff4444;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#ff6b35;stop-opacity:0.3"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="#111320"/>

  <!-- Cube - top face -->
  <polygon points="16,5 27,11 16,17 5,11" fill="url(#cube-grad)" opacity="0.4"/>
  <polygon points="16,5 27,11 16,17 5,11" fill="none" stroke="url(#edge-grad)" stroke-width="0.8"/>

  <!-- Cube - left face -->
  <polygon points="5,11 16,17 16,27 5,21" fill="url(#cube-grad)" opacity="0.6"/>
  <polygon points="5,11 16,17 16,27 5,21" fill="none" stroke="url(#edge-grad)" stroke-width="0.8"/>

  <!-- Cube - right face -->
  <polygon points="27,11 16,17 16,27 27,21" fill="url(#cube-grad)" opacity="0.8"/>
  <polygon points="27,11 16,17 16,27 27,21" fill="none" stroke="url(#edge-grad)" stroke-width="0.8"/>

  <!-- Laser beam -->
  <line x1="16" y1="1" x2="16" y2="9" stroke="url(#laser-grad)" stroke-width="2" filter="url(#glow)"/>

  <!-- Impact glow -->
  <circle cx="16" cy="10" r="3" fill="#ff6b35" opacity="0.6" filter="url(#glow)"/>
  <circle cx="16" cy="10" r="1.5" fill="#ffffff" opacity="0.8"/>
</svg>
